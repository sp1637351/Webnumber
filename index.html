<style>
/* 🌌 Body & Background - Changed to Light Neumorphic Base */
body {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #dde2e8; /* 3D effect base color */
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #4c5563; /* Dark slate text */
    overflow: hidden;
}

/* 👑 Welcome Screen */
#welcome {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    color: #4c5563;
    z-index: 2;
    text-shadow: 5px 5px 10px #a4afc2, -5px -5px 10px #ffffff;
}

/* 🪟 Main 3D Neumorphic Card (Used for Main UI and Admin UI) */
.main-card {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    max-width: 360px;
    background: #dde2e8;
    border-radius: 22px;
    /* Outer Shadow for 3D Pop Out */
    box-shadow: 12px 12px 24px #a4afc2, -12px -12px 24px #ffffff;
    padding: 30px 20px;
    text-align: center;
    display: none;
    z-index: 3;
    max-height: 80vh;
    overflow-y: auto;
}

.main-card::-webkit-scrollbar { width: 5px; }
.main-card::-webkit-scrollbar-track { background: transparent; }
.main-card::-webkit-scrollbar-thumb { background: #a4afc2; border-radius: 10px; }

/* 🔥 Title */
.title {
    color: #4c5563;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

/* 📊 Stats Grid (New for Admin) */
.stats-container {
    background: #dde2e8;
    padding: 15px;
    border-radius: 16px;
    box-shadow: inset 7px 7px 14px #a4afc2, inset -7px -7px 14px #ffffff;
    margin-bottom: 20px;
}

.total-badge {
    color: #0ea5e9;
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 15px;
    border-bottom: 2px solid rgba(14, 165, 233, 0.2);
    padding-bottom: 10px;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.stat-box {
    background: #dde2e8;
    padding: 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    color: #4c5563;
    box-shadow: 4px 4px 8px #a4afc2, -4px -4px 8px #ffffff;
    text-align: center;
}

.stat-box span {
    display: block;
    font-size: 16px;
    color: #10b981;
    margin-top: 5px;
}

/* ✨ Neumorphic Inputs */
.neumorphic-input-group {
    position: relative;
    margin-bottom: 15px;
}

.neumorphic-input {
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
    border: none;
    outline: none;
    border-radius: 22px;
    background: #dde2e8;
    color: #4c5563;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    /* Inset shadow makes it look carved in */
    box-shadow: inset 9px 9px 18px #a4afc2, inset -9px -9px 18px #ffffff;
    transition: all 0.2s ease;
}

.neumorphic-input::placeholder { color: #8a99af; font-weight: 500; }
.neumorphic-input:focus { box-shadow: inset 12px 12px 24px #a4afc2, inset -12px -12px 24px #ffffff; }

/* 🚀 Neumorphic Buttons */
.neumorphic-btn {
    width: 100%;
    padding: 15px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: #4c5563;
    border-radius: 22px;
    background: #dde2e8;
    /* Outer shadow for button */
    box-shadow: 9px 9px 18px #a4afc2, -9px -9px 18px #ffffff;
    transition: all 0.2s ease;
    margin-top: 10px;
}

.neumorphic-btn:active {
    box-shadow: inset 7px 7px 14px #a4afc2, inset -7px -7px 14px #ffffff;
    color: #0ea5e9;
}

/* specific button colors */
.btn-primary { color: #0ea5e9; }
.btn-admin { margin-top: 25px; color: #8a99af; font-size: 14px; }
.btn-save { color: #10b981; margin-top: 15px; }
.btn-close { color: #f43f5e; margin-top: 10px; }
.btn-alldata { color: #8b5cf6; margin-top: 10px; }
.btn-download { color: #f59e0b; margin-top: 10px; font-size: 14px; }

/* Admin Search row */
.admin-search-row { display: flex; gap: 10px; margin-bottom: 15px; }
.admin-search-row .neumorphic-input { margin-bottom: 0; text-align: left; padding-left: 20px;}
.admin-search-row .neumorphic-btn { margin-top: 0; width: auto; padding: 12px 20px; }

/* 👁️ Password Toggle Icon */
.toggle-password {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #8a99af;
    font-size: 16px;
    transition: 0.3s;
}
.toggle-password:hover { color: #4c5563; }

/* Admin Inputs Scroll Area */
.admin-scroll-area {
    text-align: left; overflow-y: auto; max-height: 30vh; padding: 10px 5px;
}

/* ⏳ Loading Animation */
.loading-wrapper { display: none; flex-direction: column; align-items: center; justify-content: center; margin-top: 25px; }
.sand-clock { font-size: 35px; display: inline-block; animation: spinClock 2s infinite ease-in-out; margin-bottom: 12px; filter: drop-shadow(0 0 10px #0ea5e9); }
.loading-ring { width: 45px; height: 45px; border: 4px solid rgba(14, 165, 233, 0.1); border-top: 4px solid #0ea5e9; border-right: 4px solid #3b82f6; border-radius: 50%; animation: spinRing 1s linear infinite; }
.loading-text { margin-top: 15px; color: #0ea5e9; font-size: 14px; font-weight: bold; letter-spacing: 1px; animation: pulseText 1.5s infinite; }

@keyframes spinClock { 0% { transform: rotate(0deg); } 50% { transform: rotate(180deg); } 100% { transform: rotate(360deg); } }
@keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* 📊 Result Box - Updated to compact size */
.result { 
    margin-top: 20px; display: none; color: #4c5563; text-align: left; background: #dde2e8; padding: 15px; border-radius: 16px; 
    box-shadow: inset 7px 7px 14px #a4afc2, inset -7px -7px 14px #ffffff; font-size: 14px; line-height: 1.6; 
}
.result code { 
    background: #dde2e8; 
    padding: 2px 6px; 
    border-radius: 6px; 
    color: #f43f5e; 
    box-shadow: 2px 2px 5px #a4afc2, -2px -2px 5px #ffffff; 
    font-weight: bold;
    display: inline-block; 
    margin-top: 2px;
    margin-bottom: 2px;
    word-break: break-word;
    font-size: 13px; 
}

/* ⭐ Footer */
.footer { position: fixed; bottom: 0; width: 100%; padding: 15px 0; text-align: center; font-size: 14px; font-weight: 700; color: #8a99af; z-index: 10; }

/* =========================================
   🤍 MODALS (Login & All Database) 🤍
   ========================================= */
.overlay-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100;
}

.modal-ui {
    background: #dde2e8; border-radius: 22px; box-shadow: 12px 12px 24px #a4afc2, -12px -12px 24px #ffffff; width: 320px; padding: 32px; text-align: center; position: relative; animation: popIn 0.3s ease-out forwards;
}

@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

.modal-ui h1 { margin-bottom: 30px; margin-top: 0; color: #4c5563; font-size: 24px; font-weight: 800; }
.close-neumorphic { position: absolute; top: 15px; right: 15px; background: #dde2e8; border: none; font-size: 16px; color: #f43f5e; cursor: pointer; transition: 0.3s; box-shadow: 3px 3px 6px #a4afc2, -3px -3px 6px #ffffff; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
.close-neumorphic:active { box-shadow: inset 2px 2px 4px #a4afc2, inset -2px -2px 4px #ffffff; }

/* Full Database List Box */
#allDataList {
    max-height: 65vh;
    overflow-y: auto;
    padding: 10px;
}
#allDataList::-webkit-scrollbar { width: 5px; }
#allDataList::-webkit-scrollbar-track { background: transparent; }
#allDataList::-webkit-scrollbar-thumb { background: #a4afc2; border-radius: 10px; }

/* =========================================
   🔥 3D HOVER ICONS 🔥
   ========================================= */
.link-area-wrapper {
    position: fixed; bottom: 60px; width: 100%; display: flex; justify-content: center; z-index: 5;
}

.icon-row { display: flex; gap: 15px; }
.card-item { text-decoration: none; }
.card-link {
    position: relative; display: flex; justify-content: center; align-items: center; width: 45px; height: 45px; background-color: #dde2e8; color: #4c5563; font-size: 20px; border-radius: 12px; 
    transform: perspective(1000px) rotate(-30deg) skew(25deg) translate(0, 0); transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: -10px 10px 15px rgba(0, 0, 0, 0.2);
}

.card-link::before {
    content: ''; position: absolute; top: 5px; left: -10px; height: 100%; width: 10px; background-color: #c8ced5; transition: all 0.5s; transform: skewY(-45deg); border-radius: 6px 0 0 6px;
}
.card-link::after {
    content: ''; position: absolute; bottom: -10px; left: -5px; height: 10px; width: 100%; background-color: #aeb5be; transition: all 0.5s; transform: skewX(-45deg); border-radius: 0 0 6px 6px;
}

/* Hover Colors */
.card-item.youtube:hover .card-link { transform: perspective(1000px) rotate(-30deg) skew(25deg) translate(10px, -10px); box-shadow: -20px 20px 20px rgba(0, 0, 0, 0.3); background-color: #ff0000; color: white; }
.card-item.youtube:hover .card-link::before { background-color: #cc0000; }
.card-item.youtube:hover .card-link::after { background-color: #990000; }

.card-item.instagram:hover .card-link { transform: perspective(1000px) rotate(-30deg) skew(25deg) translate(10px, -10px); box-shadow: -20px 20px 20px rgba(0, 0, 0, 0.3); background-color: #e1306c; color: white; }
.card-item.instagram:hover .card-link::before { background-color: #b8265a; }
.card-item.instagram:hover .card-link::after { background-color: #8f1d46; }

.card-item.facebook:hover .card-link { transform: perspective(1000px) rotate(-30deg) skew(25deg) translate(10px, -10px); box-shadow: -20px 20px 20px rgba(0, 0, 0, 0.3); background-color: #1877f2; color: white; }
.card-item.facebook:hover .card-link::before { background-color: #135cae; }
.card-item.facebook:hover .card-link::after { background-color: #0e4584; }

.card-item.twitter:hover .card-link { transform: perspective(1000px) rotate(-30deg) skew(25deg) translate(10px, -10px); box-shadow: -20px 20px 20px rgba(0, 0, 0, 0.3); background-color: #1da1f2; color: white; }
.card-item.twitter:hover .card-link::before { background-color: #1681c4; }
.card-item.twitter:hover .card-link::after { background-color: #106297; }

</style>

// ✍️ Typing Effect
const text = "👑 WELCOME NUMBER INFO BOT 👑";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("welcome").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 60);
    } else {
        setTimeout(() => {
            document.getElementById("welcome").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
        }, 1000);
    }
}
typeEffect();

// ✨ Wrap ALL values in the 3D Code Box
function formatResult(dataStr) {
    let cleanStr = dataStr.replace(/`/g, '');
    let formatted = cleanStr.replace(/\*\*(.*?)\*\*\s*(.*)/g, '<b style="color: #0ea5e9;">$1</b> <code>$2</code>');
    formatted = formatted.replace(/\n/g, '<br>');
    return formatted;
}

// ✨ Calculates Total Records + Specific Stats
function updateTotalRecords() {
    let tCount = 0, eCount = 0, aCount = 0, iCount = 0, sCount = 0;
    
    for (let key in numberDatabase) {
        tCount++;
        let data = numberDatabase[key];
        
        if (/📧 \*\*Email:\*\* (?!No Information)/.test(data)) eCount++;
        if (/🪪 \*\*(Aadhar|Aadhar\/ID|ID Number):\*\* (?!No Information)/.test(data)) aCount++;
        if (/📸 \*\*Instagram ID:\*\* (?!No Information)/.test(data)) iCount++;
        if (/👻 \*\*Snapchat ID:\*\* (?!No Information)/.test(data)) sCount++;
    }
    
    document.getElementById("totalRecordsCount").innerText = tCount;
    document.getElementById("emailCount").innerText = eCount;
    document.getElementById("aadharCount").innerText = aCount;
    document.getElementById("instaCount").innerText = iCount;
    document.getElementById("snapCount").innerText = sCount;
}

function show() {
    let rawInput = document.getElementById("numInput").value.trim();
    let r = document.getElementById("resultBox");
    let loader = document.getElementById("loadingUI");
    
    r.style.display = "none";
    loader.style.display = "none";

    if (rawInput === "") {
        r.style.display = "block";
        r.innerHTML = "⚠️ Please enter a valid number.";
        return;
    }

    let searchKey = rawInput.replace(/^\+91\s*/, '').replace(/^0/, '').replace(/[\s-]/g, '');
    loader.style.display = "flex";

    setTimeout(() => {
        loader.style.display = "none";
        r.style.display = "block";

        if (numberDatabase[searchKey]) {
            r.innerHTML = `<div style="margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid rgba(16, 185, 129, 0.2); padding-bottom: 5px; color: #10b981;">✅ <b>Record Found</b></div>` 
                          + formatResult(numberDatabase[searchKey]);
        } else {
            r.innerHTML = `<span style="color: #f43f5e;">❌ <b>No Data Found</b></span><br><br>The number "${searchKey}" is not in the database.`;
        }
    }, 2500);
}

        let addressMatch = dataStr.match(/🏠 <b[^>]*>Address:<\/b> (.*)/) || dataStr.match(/🏠 \*\*Address:\*\* (.*)/);
        let circleMatch = dataStr.match(/📶 <b[^>]*>Circle:<\/b> (.*)/) || dataStr.match(/📶 \*\*Circle:\*\* (.*)/);
        let aadharMatch = dataStr.match(/🪪 <b[^>]*>(?:Aadhar|Aadhar\/ID|ID Number):<\/b> \`?(.*?)\`?(?:\n|<br>|$)/) || dataStr.match(/🪪 \*\*(?:Aadhar|Aadhar\/ID|ID Number):\*\* \`?(.*?)\`?(?:\n|$)/);
        let instaMatch = dataStr.match(/📸 <b[^>]*>Instagram ID:<\/b> \`?(.*?)\`?(?:\n|<br>|$)/) || dataStr.match(/📸 \*\*Instagram ID:\*\* \`?(.*?)\`?(?:\n|$)/);
        let snapMatch = dataStr.match(/👻 <b[^>]*>Snapchat ID:<\/b> \`?(.*?)\`?(?:\n|<br>|$)/) || dataStr.match(/👻 \*\*Snapchat ID:\*\* \`?(.*?)\`?(?:\n|$)/);

        document.getElementById("addName").value = nameMatch && nameMatch[1] !== "No Information" ? nameMatch[1] : "";
        document.getElementById("addFather").value = fatherMatch && fatherMatch[1] !== "No Information" ? fatherMatch[1] : "";
        document.getElementById("addEmail").value = emailMatch && emailMatch[1] !== "No Information" ? emailMatch[1] : "";
        document.getElementById("addAddress").value = addressMatch && addressMatch[1] !== "No Information" ? addressMatch[1] : "";
        document.getElementById("addCircle").value = circleMatch && circleMatch[1] !== "No Information" ? circleMatch[1] : "";
        document.getElementById("addAadhar").value = aadharMatch && aadharMatch[1] !== "No Information" ? aadharMatch[1] : "";
        document.getElementById("addInsta").value = instaMatch && instaMatch[1] !== "No Information" ? instaMatch[1] : "";
        document.getElementById("addSnap").value = snapMatch && snapMatch[1] !== "No Information" ? snapMatch[1] : "";
        
    } else {
        statusMsg.innerText = "ℹ️ No record found. You can add it as a new entry.";
        statusMsg.style.color = "#0ea5e9";
        
        document.getElementById("addName").value = "";
        document.getElementById("addFather").value = "";
        document.getElementById("addEmail").value = "";
        document.getElementById("addAddress").value = "";
        document.getElementById("addCircle").value = "";
        document.getElementById("addAadhar").value = "";
        document.getElementById("addInsta").value = "";
        document.getElementById("addSnap").value = "";
    }
}

function saveNewRecord() {
    let num = document.getElementById("adminSearchNum").value.trim();
    
    if (num === "") {
        alert("⚠️ Please enter Target Number at the top first!");
        return;
    }

    let name = document.getElementById("addName").value.trim() || "No Information";
    let father = document.getElementById("addFather").value.trim() || "No Information";
    
    let emailVal = document.getElementById("addEmail").value.trim();
    let email = emailVal ? `\`${emailVal}\`` : "No Information";
    
    let address = document.getElementById("addAddress").value.trim() || "No Information";
    let circle = document.getElementById("addCircle").value.trim() || "No Information";
    
    let aadharVal = document.getElementById("addAadhar").value.trim();
    let aadhar = aadharVal ? `\`${aadharVal}\`` : "No Information";

    let instaVal = document.getElementById("addInsta").value.trim();
    let insta = instaVal ? `\`${instaVal}\`` : "No Information";

    let snapVal = document.getElementById("addSnap").value.trim();
    let snap = snapVal ? `\`${snapVal}\`` : "No Information";

    let newDataStr = `👤 **Name:** ${name}\n👨‍👦 **Father's Name:** ${father}\n📧 **Email:** ${email}\n🏠 **Address:** ${address}\n📶 **Circle:** ${circle}\n🪪 **Aadhar:** ${aadhar}\n📸 **Instagram ID:** ${insta}\n👻 **Snapchat ID:** ${snap}`;

    numberDatabase[num] = newDataStr;
    localData[num] = newDataStr;
    localStorage.setItem("vipBotCustomData", JSON.stringify(localData));

    updateTotalRecords();

    alert(`✅ Record for ${num} Saved/Updated Successfully!`);
    closeAdmin(); 
}

// ✨ Show All Database List
function showAllDatabase() {
    let container = document.getElementById("allDataList");
    container.innerHTML = "";
    
    for (let num in numberDatabase) {
        let card = document.createElement("div");
        card.className = "result";
        card.style.display = "block";
        card.style.marginBottom = "15px";
        
        let header = `<div style="color: #0ea5e9; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #a4afc2; padding-bottom: 4px;">📞 Target: ${num}</div>`;
        card.innerHTML = header + formatResult(numberDatabase[num]);
        
        container.appendChild(card);
    }
    
    document.getElementById("allDatabaseModal").style.display = "flex";
}

function closeAllDatabase() {
    document.getElementById("allDatabaseModal").style.display = "none";
}

// ✨ Download Source Code Function
function downloadSourceCode() {
    // Gets the current HTML content of the page
    let htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    
    // Create a Blob containing the text data
    let blob = new Blob([htmlContent], { type: "text/html" });
    
    // Create an invisible A tag, set the download attribute and trigger click
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "NumberInfoBot_Premium.html";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
